spring:
  application:
    name: ai-code-mother-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_mother
    username: root
    password: zcl201314
  profiles:
    active: local

  # redis
  data:
    redis:
      host: ${spring.data.redis.host}
      port: 6379
      user: ${spring.data.redis.user:default}
      password: ${spring.data.redis.password:12345678}
      ttl: 3600 #过期时间，单位s

  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000




server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.codingzhou.aicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${langchain4j.open-ai.chat-model.api-key}
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      strict-json-schema: true
      response-format: json_object
      max-token: 8192

    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${langchain4j.open-ai.streaming-chat-model.api-key}
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
      strict-json-schema: true

    reasoning-chat-model:
      base-url: ${langchain4j.open-ai.reasoning-chat-model.base-url:https://api.deepseek.com}
      api-key: ${langchain4j.open-ai.reasoning-chat-model.api-key}
      model-name: ${langchain4j.open-ai.reasoning-chat-model.model-name:deepseek-chat}
      max-tokens: ${langchain4j.open-ai.reasoning-chat-model.max-tokens:8192}